<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huddle — Debug</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 28px 20px 60px;
  }

  header {
    max-width: 1200px;
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
  h1 span { font-size: 0.85rem; font-weight: 400; color: #555; margin-left: 10px; }

  .summary { display: flex; gap: 10px; flex-wrap: wrap; }

  .badge { padding: 5px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; border: 1px solid; }
  .badge-total   { background: #1a1a1a; border-color: #333; color: #aaa; }
  .badge-ok      { background: #141f13; border-color: #2d5c28; color: #7acc6e; }
  .badge-fail    { background: #1f1313; border-color: #5c2828; color: #cc6e6e; }
  .badge-loading { background: #1a1a18; border-color: #4a4a28; color: #cccc6e; }

  .controls {
    max-width: 1200px;
    margin: 0 auto 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 7px 16px; border-radius: 8px; border: 1px solid #2e2e2e;
    background: #1a1a1a; color: #888; font-family: 'Segoe UI', sans-serif;
    font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #444; color: #ccc; }
  .filter-btn.active { background: #272727; border-color: #555; color: #fff; }

  .reload-btn {
    padding: 7px 16px; border-radius: 8px; border: 1px solid #2e2e2e;
    background: #1a1a1a; color: #888; font-family: 'Segoe UI', sans-serif;
    font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-left: auto;
  }
  .reload-btn:hover { border-color: #555; color: #fff; }

  .grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .card {
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 12px; overflow: hidden; transition: border-color 0.2s;
  }
  .card.ok      { border-color: #2d5c28; }
  .card.fail    { border-color: #5c2828; }
  .card.loading { border-color: #4a4a28; }

  /* IMAGE SLIDESHOW */
  .card-img-wrap {
    position: relative; width: 100%; padding-bottom: 56.25%; background: #111;
  }

  .card-img-wrap .slide {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  .card-img-wrap .slide.active { opacity: 1; }

  .card-status-pill {
    position: absolute; top: 8px; right: 8px;
    padding: 3px 9px; border-radius: 6px;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
    z-index: 2;
  }
  .pill-ok      { background: rgba(20,31,19,0.92); color: #7acc6e; border: 1px solid #2d5c28; }
  .pill-fail    { background: rgba(31,19,19,0.92); color: #cc6e6e; border: 1px solid #5c2828; }
  .pill-loading { background: rgba(26,26,20,0.92); color: #cccc6e; border: 1px solid #4a4a28; }

  .card-img-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; color: #cc6e6e;
    padding: 12px; text-align: center; line-height: 1.5;
  }

  .card-index {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.7); color: #888;
    font-size: 0.65rem; font-weight: 700;
    padding: 2px 7px; border-radius: 5px; font-family: monospace; z-index: 2;
  }

  /* image count pip */
  .img-count {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 2;
  }

  .img-pip {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.1);
    transition: background 0.3s;
  }
  .img-pip.active { background: rgba(255,255,255,0.8); }

  .card-body {
    padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
  }

  .card-name { font-size: 0.95rem; font-weight: 700; color: #e0e0e0; }
  .card-author { font-size: 0.75rem; color: #555; }

  .card-urls {
    display: flex; flex-direction: column; gap: 3px;
  }

  .card-url {
    font-size: 0.68rem; color: #444;
    word-break: break-all; line-height: 1.4; font-family: monospace;
  }
  .card-url.bad { color: #cc6e6e; }
  .card-url.ok  { color: #3a6e35; }

  .card-actions { display: flex; gap: 6px; margin-top: 4px; }

  .card-link {
    flex: 1; padding: 6px 10px; border-radius: 7px;
    border: 1px solid #2e2e2e; background: #141414; color: #888;
    font-family: 'Segoe UI', sans-serif; font-size: 0.75rem; font-weight: 600;
    cursor: pointer; text-decoration: none; text-align: center;
    transition: all 0.12s; display: block;
  }
  .card-link:hover { border-color: #444; color: #ccc; }

  .no-results {
    max-width: 960px; margin: 40px auto;
    text-align: center; color: #444; font-size: 0.9rem;
  }

  .ac-test {
    max-width: 960px; margin: 0 auto 28px;
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 12px; padding: 16px;
  }
  .ac-test h2 {
    font-size: 0.8rem; font-weight: 600; color: #555;
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px;
  }
  .ac-input {
    width: 100%; background: #111; border: 1px solid #2e2e2e; border-radius: 8px;
    color: #e0e0e0; font-family: 'Segoe UI', sans-serif; font-size: 0.9rem;
    padding: 9px 14px; outline: none;
  }
  .ac-input:focus { border-color: #444; }
  .ac-input::placeholder { color: #333; }
  .ac-results {
    margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px;
  }
  .ac-match {
    padding: 4px 12px; border-radius: 6px;
    background: #141414; border: 1px solid #2e2e2e;
    font-size: 0.8rem; color: #aaa;
  }
  .ac-match mark { background: none; color: #fff; font-weight: 700; }
  .ac-none { color: #444; font-size: 0.8rem; align-self: center; }

  /* PAGINATION */
  .pagination {
    max-width: 1200px;
    margin: 24px auto 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .page-btn {
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid #2e2e2e;
    background: #1a1a1a;
    color: #888;
    font-family: 'Segoe UI', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 36px;
    text-align: center;
  }
  .page-btn:hover { border-color: #444; color: #ccc; }
  .page-btn.active { background: #272727; border-color: #555; color: #fff; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .page-info {
    font-size: 0.78rem;
    color: #444;
    padding: 0 8px;
  }
</style>
</head>
<body>

<header>
  <h1>huddle debug <span id="header-sub">loading...</span></h1>
  <div class="summary">
    <div class="badge badge-total">Total: <span id="count-total">—</span></div>
    <div class="badge badge-ok">✓ OK: <span id="count-ok">0</span></div>
    <div class="badge badge-fail">✗ Failed: <span id="count-fail">0</span></div>
    <div class="badge badge-loading">⏳ Loading: <span id="count-loading">0</span></div>
  </div>
</header>

<div class="ac-test">
  <h2>Autocomplete test (dash/space ignored)</h2>
  <input class="ac-input" id="ac-input" placeholder="Type a HUD name to test matching..." autocomplete="off" />
  <div class="ac-results" id="ac-results"><span class="ac-none">Start typing to test...</span></div>
</div>

<div class="controls">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="ok">✓ OK</button>
  <button class="filter-btn" data-filter="fail">✗ Failed</button>
  <button class="filter-btn" data-filter="loading">⏳ Loading</button>
  <button class="reload-btn" id="reload-btn">↻ Retry failed</button>
</div>

<div class="grid" id="grid"></div>
<div class="no-results" id="no-results" style="display:none">No HUDs match this filter.</div>
<div class="pagination" id="pagination"></div>

<script src="huds.js"></script>
<script>
// ============================================================
// HELPERS
// ============================================================
function getUrls(hud) {
  return Array.isArray(hud.url) ? hud.url : [hud.url];
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// STATE
// ============================================================
const statuses = {}; // index -> { overall, urls: ['ok'|'fail'|'loading', ...] }
let activeFilter = 'all';
let currentPage = 0;
const PAGE_SIZE = 25;
const slideTimers = {}; // index -> interval

HUDS.forEach((hud, i) => {
  const urls = getUrls(hud);
  statuses[i] = { overall: 'loading', urls: urls.map(() => 'loading') };
});

// ============================================================
// STATUS
// ============================================================
function setUrlStatus(hudIndex, urlIndex, status) {
  statuses[hudIndex].urls[urlIndex] = status;

  // overall = fail if ALL fail, ok if ANY ok, else loading
  const all = statuses[hudIndex].urls;
  if (all.every(s => s === 'fail'))       statuses[hudIndex].overall = 'fail';
  else if (all.some(s => s === 'ok'))     statuses[hudIndex].overall = 'ok';
  else                                    statuses[hudIndex].overall = 'loading';

  updateCard(hudIndex);
  updateSummary();

  const done = Object.values(statuses).filter(s => s.overall !== 'loading').length;
  if (done === HUDS.length) buildCards();
}

// ============================================================
// BUILD CARDS
// ============================================================
const grid = document.getElementById('grid');

function buildCards() {
  // Stop all slide timers
  Object.keys(slideTimers).forEach(i => clearInterval(slideTimers[i]));

  grid.innerHTML = '';

  const filtered = HUDS.map((h, i) => ({ ...h, i }))
    .filter(h => activeFilter === 'all' ? true : statuses[h.i].overall === activeFilter)
    .sort((a, b) => {
      const order = { fail: 0, loading: 1, ok: 2 };
      return (order[statuses[a.i].overall] ?? 1) - (order[statuses[b.i].overall] ?? 1);
    });

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage >= totalPages) currentPage = 0;

  const pageItems = filtered.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);

  document.getElementById('no-results').style.display = filtered.length === 0 ? 'block' : 'none';

  pageItems.forEach(({ name, url, link, author, i }) => {
    const urls = getUrls(HUDS[i]);
    const overall = statuses[i].overall;
    const urlStatuses = statuses[i].urls;

    const card = document.createElement('div');
    card.className = `card ${overall}`;
    card.id = `card-${i}`;

    const imagesHtml = urls.map((u, ui) => {
      if (urlStatuses[ui] === 'fail') return '';
      return `<img loading="lazy" class="slide${ui === 0 ? ' active' : ''}" src="${escHtml(u)}" data-hud="${i}" data-url="${ui}" />`;
    }).join('');

    const pipsHtml = urls.length > 1
      ? `<div class="img-count">${urls.map((_, ui) => `<div class="img-pip${ui === 0 ? ' active' : ''}"></div>`).join('')}</div>`
      : '';

    const urlsHtml = urls.map((u, ui) => `
      <div class="card-url ${urlStatuses[ui] === 'fail' ? 'bad' : urlStatuses[ui] === 'ok' ? 'ok' : ''}">
        ${urlStatuses[ui] === 'fail' ? '✗' : urlStatuses[ui] === 'ok' ? '✓' : '⏳'} ${escHtml(u)}
      </div>
    `).join('');

    const imageLinksHtml = urls.map((u, ui) =>
      `<a class="card-link" href="${escHtml(u)}" target="_blank">🖼 Image ${urls.length > 1 ? ui+1 : ''}</a>`
    ).join('');

    card.innerHTML = `
      <div class="card-img-wrap" id="imgwrap-${i}">
        <div class="card-index">#${i}</div>
        ${overall === 'fail'
          ? `<div class="card-img-placeholder">⚠️ All images failed</div>`
          : imagesHtml
        }
        ${pipsHtml}
        <div class="card-status-pill pill-${overall}">
          ${overall === 'ok' ? '✓ OK' : overall === 'fail' ? '✗ FAIL' : '⏳ ...'}
        </div>
      </div>
      <div class="card-body">
        <div class="card-name">${escHtml(name)}</div>
        <div class="card-author">by ${escHtml(author)}</div>
        <div class="card-urls">${urlsHtml}</div>
        <div class="card-actions">
          <a class="card-link" href="${escHtml(link)}" target="_blank">🔗 HUD page</a>
          ${imageLinksHtml}
        </div>
      </div>
    `;

    card.querySelectorAll('img.slide').forEach(img => {
      const ui = parseInt(img.dataset.url);
      img.addEventListener('load',  () => setUrlStatus(i, ui, 'ok'));
      img.addEventListener('error', () => setUrlStatus(i, ui, 'fail'));
    });

    grid.appendChild(card);
    if (urls.length > 1) startSlideshow(i, urls.length);
  });

renderPagination(filtered.length, totalPages);
}

function goToPage(p) {
  currentPage = p;
  buildCards();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
// ============================================================
// PAGINATION
// ============================================================
function renderPagination(totalItems, totalPages) {
  const container = document.getElementById('pagination');
  container.innerHTML = '';
  if (totalPages <= 1) return;

  const prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.textContent = '←';
  prev.disabled = currentPage === 0;
  prev.addEventListener('click', () => goToPage(currentPage - 1));
  container.appendChild(prev);

  // Show limited page buttons around current page
  const range = 2;
  for (let p = 0; p < totalPages; p++) {
    if (p !== 0 && p !== totalPages - 1 && Math.abs(p - currentPage) > range) {
      // Add ellipsis once
      if (p === 1 || p === totalPages - 2) {
        const ellipsis = document.createElement('span');
        ellipsis.className = 'page-info';
        ellipsis.textContent = '...';
        container.appendChild(ellipsis);
      }
      continue;
    }
    const btn = document.createElement('button');
    btn.className = `page-btn${p === currentPage ? ' active' : ''}`;
    btn.textContent = p + 1;
    btn.addEventListener('click', () => goToPage(p));
    container.appendChild(btn);
  }

  const next = document.createElement('button');
  next.className = 'page-btn';
  next.textContent = '→';
  next.disabled = currentPage === totalPages - 1;
  next.addEventListener('click', () => goToPage(currentPage + 1));
  container.appendChild(next);

  const info = document.createElement('span');
  info.className = 'page-info';
  const start = currentPage * PAGE_SIZE + 1;
  const end = Math.min((currentPage + 1) * PAGE_SIZE, totalItems);
  info.textContent = `${start}–${end} of ${totalItems}`;
  container.appendChild(info);
}

// ============================================================
// SLIDESHOW
// ============================================================
function startSlideshow(hudIndex, count) {
  let current = 0;

  slideTimers[hudIndex] = setInterval(() => {
    const wrap = document.getElementById(`imgwrap-${hudIndex}`);
    if (!wrap) { clearInterval(slideTimers[hudIndex]); return; }

    const slides = wrap.querySelectorAll('.slide');
    const pips   = wrap.querySelectorAll('.img-pip');

    // Find next valid (non-failed) slide
    let next = (current + 1) % count;
    let tries = 0;
    while (statuses[hudIndex].urls[next] === 'fail' && tries < count) {
      next = (next + 1) % count;
      tries++;
    }
    if (tries === count) return; // all failed

    slides.forEach((s, i) => s.classList.toggle('active', i === next));
    pips.forEach((p, i) => p.classList.toggle('active', i === next));
    current = next;
  }, 2500);
}

// ============================================================
// UPDATE SINGLE CARD
// ============================================================
function updateCard(i) {
  const card = document.getElementById(`card-${i}`);
  if (!card) return;

  const overall = statuses[i].overall;
  card.className = `card ${overall}`;

  const pill = card.querySelector('.card-status-pill');
  if (pill) {
    pill.className = `card-status-pill pill-${overall}`;
    pill.textContent = overall === 'ok' ? '✓ OK' : overall === 'fail' ? '✗ FAIL' : '⏳ ...';
  }

  // Update url status indicators
  const urlDivs = card.querySelectorAll('.card-url');
  statuses[i].urls.forEach((s, ui) => {
    if (urlDivs[ui]) {
      urlDivs[ui].className = `card-url ${s === 'fail' ? 'bad' : s === 'ok' ? 'ok' : ''}`;
    }
  });
}

// ============================================================
// SUMMARY
// ============================================================
function updateSummary() {
  const total   = HUDS.length;
  const ok      = Object.values(statuses).filter(s => s.overall === 'ok').length;
  const fail    = Object.values(statuses).filter(s => s.overall === 'fail').length;
  const loading = Object.values(statuses).filter(s => s.overall === 'loading').length;

  document.getElementById('count-total').textContent   = total;
  document.getElementById('count-ok').textContent      = ok;
  document.getElementById('count-fail').textContent    = fail;
  document.getElementById('count-loading').textContent = loading;

  const done = ok + fail;
  document.getElementById('header-sub').textContent =
    done === total ? `all ${total} checked` : `checking ${done}/${total}...`;
}

// ============================================================
// FILTER BUTTONS
// ============================================================
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    currentPage = 0;
    buildCards();
  });
});

// ============================================================
// RETRY FAILED
// ============================================================
document.getElementById('reload-btn').addEventListener('click', () => {
  HUDS.forEach((hud, i) => {
    const urls = getUrls(hud);
    let anyRetried = false;
    urls.forEach((url, ui) => {
      if (statuses[i].urls[ui] === 'fail') {
        statuses[i].urls[ui] = 'loading';
        statuses[i].overall  = 'loading';
        anyRetried = true;
      }
    });
    if (anyRetried) {
      // Rebuild card so new img elements are created
      const card = document.getElementById(`card-${i}`);
      if (card) card.remove();
      buildCards();
    }
  });
  updateSummary();
});

// ============================================================
// AUTOCOMPLETE TEST
// ============================================================
const acInput   = document.getElementById('ac-input');
const acResults = document.getElementById('ac-results');

acInput.addEventListener('input', () => {
  const val = acInput.value.trim().toLowerCase().replace(/[-\s]/g, '');
  acResults.innerHTML = '';
  if (!val) { acResults.innerHTML = '<span class="ac-none">Start typing to test...</span>'; return; }

  const matches = HUDS.filter(h => h.name.toLowerCase().replace(/[-\s]/g, '').includes(val));
  if (matches.length === 0) { acResults.innerHTML = '<span class="ac-none">No matches</span>'; return; }

  matches.forEach(h => {
    const el = document.createElement('div');
    el.className = 'ac-match';
    el.textContent = h.name;
    acResults.appendChild(el);
  });
});

// ============================================================
// INIT — probe images that may be off-screen / filtered
// ============================================================
updateSummary();
buildCards();

function probeAllImages() {
  const BATCH = 25;
  let idx = 0;

  function nextBatch() {
    const end = Math.min(idx + BATCH, HUDS.length);
    for (let i = idx; i < end; i++) {
      getUrls(HUDS[i]).forEach((url, ui) => {
        const probe = new Image();
        probe.onload  = () => setUrlStatus(i, ui, 'ok');
        probe.onerror = () => setUrlStatus(i, ui, 'fail');
        probe.src = url;
      });
    }
    idx = end;
    if (idx < HUDS.length) setTimeout(nextBatch, 500);
  }

  nextBatch();
}

probeAllImages();
</script>
</body>
</html>
